name: Python Validation
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f agent_container/requirements.txt ]; then pip install -r agent_container/requirements.txt; fi
    - name: Syntax Check
      run: |
        python -m py_compile agent_container/app/main.py